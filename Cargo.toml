[workspace]
members = ["crates/cli", "crates/compressor"]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
clap = "4"
colored = "2"
console = "0.15"
dialoguer = "0.11"
open = "5"
serde = "1"
toml = "0.8"
uuid = "1"
tokio = "1"
reqwest = { version = "0.12", default-features = false }
serde_json = "1"
self_update = { version = "0.43.1", default-features = false }
