[package]
name = "edgee-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "edgee"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
console = "0.15"
dialoguer = "0.11"
open = "5"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal", "io-util"] }
