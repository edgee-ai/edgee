[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
axum-core = "0.5"
bytes = "1"
clap = "4"
colored = "2"
console = "0.15"
dialoguer = "0.11"
futures = "0.3"
http = "1"
http-body-util = "0.1"
open = "5"
reqwest = { version = "0.13", default-features = false }
self_update = { version = "0.43.1", default-features = false }
serde = "1"
serde_json = "1"
thiserror = "2"
time = { version = "0.3" }
tokio = "1"
toml = "0.8"
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
uuid = "1"
