name: Build release
permissions:
  contents: write
  pull-requests: write
on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate name (e.g. edgee-cli)"
        required: true
        type: string
      version:
        description: "Version without leading v (e.g. 0.2.1)"
        required: true
        type: string
  push:
    tags:
      - "*-[0-9]*.[0-9]*.[0-9]*"
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      crate: ${{ steps.parse.outputs.crate }}
      version: ${{ steps.parse.outputs.version }}
      is_cli: ${{ steps.parse.outputs.is_cli }}
    steps:
      - name: Parse crate and version from trigger
        id: parse
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CRATE="${{ inputs.crate }}"
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION=$(echo "$TAG" | grep -oP '\d+\.\d+\.\d+[^-]*$')
            CRATE="${TAG%-${VERSION}}"
          fi

          if [ -z "$CRATE" ] || [ -z "$VERSION" ]; then
            echo "ERROR: could not parse crate or version from '${GITHUB_REF_NAME}'"
            exit 1
          fi

          # Normalize shorthand tag names: cli → edgee-cli, compressor → edgee-compressor, etc.
          [[ "$CRATE" != edgee-* ]] && CRATE="edgee-${CRATE}"

          IS_CLI="false"
          [ "$CRATE" = "edgee-cli" ] && IS_CLI="true"

          echo "crate=${CRATE}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_cli=${IS_CLI}"   >> "$GITHUB_OUTPUT"

          echo "Parsed: crate=${CRATE} version=${VERSION} is_cli=${IS_CLI}"

  bump-version:
    needs: setup
    runs-on: ubuntu-latest
    env:
      CRATE: ${{ needs.setup.outputs.crate }}
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve manifest path
        id: manifest
        run: |
          MANIFEST=$(cargo metadata --format-version 1 --no-deps \
            | jq -r --arg name "$CRATE" \
              '.packages[] | select(.name == $name) | .manifest_path')
          if [ -z "$MANIFEST" ]; then
            echo "ERROR: no package named '$CRATE' found in workspace"
            exit 1
          fi
          echo "path=${MANIFEST}" >> "$GITHUB_OUTPUT"

      - name: Bump version in Cargo.toml and Cargo.lock
        run: |
          MANIFEST="${{ steps.manifest.outputs.path }}"
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" "$MANIFEST"
          grep -q "^version = \"${VERSION}\"" "$MANIFEST" || \
            { echo "ERROR: version patch did not apply to $MANIFEST"; exit 1; }
          cargo update -p "$CRATE"

      - name: Open PR with version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-${CRATE}-to-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "${{ steps.manifest.outputs.path }}" Cargo.lock
          git diff --staged --quiet && echo "Version already up to date, skipping PR." && exit 0
          git commit -m "chore: bump ${CRATE} to ${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump ${CRATE} to ${VERSION}" \
            --body "Automated version bump triggered by release tag \`${GITHUB_REF_NAME}\`." \
            --base main \
            --head "$BRANCH"

  build-release-binaries:
    needs: setup
    if: needs.setup.outputs.is_cli == 'true'
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rustflags: -C target-feature=+crt-static
            bin_suffix: .exe
    name: Build release binary (${{ matrix.platform.target }} on ${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.os }}
    env:
      RUSTFLAGS: ${{ matrix.platform.rustflags || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" crates/cli/Cargo.toml
          rm -f crates/cli/Cargo.toml.bak
          grep -q "^version = \"${VERSION}\"" crates/cli/Cargo.toml || \
            { echo "ERROR: version patch did not apply to crates/cli/Cargo.toml"; exit 1; }

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "-p edgee-cli --bin edgee --release"

      - name: Save binary
        uses: actions/upload-artifact@v4
        with:
          name: edgee.${{ matrix.platform.target }}${{ matrix.platform.bin_suffix || '' }}
          path: target/${{ matrix.platform.target }}/release/edgee${{ matrix.platform.bin_suffix || '' }}
          retention-days: 3

      - name: Prepare release files
        shell: bash
        run: |
          BIN="edgee.${{ matrix.platform.target }}${{ matrix.platform.bin_suffix || '' }}"
          cp "target/${{ matrix.platform.target }}/release/edgee${{ matrix.platform.bin_suffix || '' }}" "$BIN"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$BIN" | awk '{print $1}' > "$BIN.sha256"
          else
            shasum -a 256 "$BIN" | awk '{print $1}' > "$BIN.sha256"
          fi

      - name: Publish artifacts and release
        uses: xresloader/upload-to-github-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file: "edgee.${{ matrix.platform.target }}${{ matrix.platform.bin_suffix || '' }};edgee.${{ matrix.platform.target }}${{ matrix.platform.bin_suffix || '' }}.sha256"
          tags: true

  publish-crate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          CRATE="${{ needs.setup.outputs.crate }}"
          VERSION="${{ needs.setup.outputs.version }}"
          MANIFEST=$(cargo metadata --format-version 1 --no-deps \
            | jq -r --arg name "$CRATE" \
              '.packages[] | select(.name == $name) | .manifest_path')
          if [ -z "$MANIFEST" ]; then
            echo "ERROR: no package named '$CRATE' found in workspace"
            exit 1
          fi
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" "$MANIFEST"
          grep -q "^version = \"${VERSION}\"" "$MANIFEST" || \
            { echo "ERROR: version patch did not apply to $MANIFEST"; exit 1; }

      - name: Publish to crates.io
        uses: katyo/publish-crates@v2
        with:
          args: -p ${{ needs.setup.outputs.crate }} --allow-dirty
          registry-token: ${{ secrets.CRATES_IO_TOKEN }}

  update-homebrew-tap:
    needs: [setup, build-release-binaries]
    runs-on: ubuntu-latest
    if: needs.setup.outputs.is_cli == 'true'
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: edgee-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for platform in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --pattern "edgee.${platform}.sha256" \
              --output "edgee.${platform}.sha256"
          done

      - name: Update formula
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          SHA_AARCH64_DARWIN=$(cat edgee.aarch64-apple-darwin.sha256)
          SHA_X86_64_DARWIN=$(cat edgee.x86_64-apple-darwin.sha256)
          SHA_AARCH64_LINUX=$(cat edgee.aarch64-unknown-linux-gnu.sha256)
          SHA_X86_64_LINUX=$(cat edgee.x86_64-unknown-linux-gnu.sha256)

          FORMULA="homebrew-tap/Formula/edgee.rb"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "s/\"aarch64-apple-darwin\" => \".*\"/\"aarch64-apple-darwin\" => \"${SHA_AARCH64_DARWIN}\"/" "$FORMULA"
          sed -i "s/\"x86_64-apple-darwin\" => \".*\"/\"x86_64-apple-darwin\" => \"${SHA_X86_64_DARWIN}\"/" "$FORMULA"
          sed -i "s/\"aarch64-unknown-linux-gnu\" => \".*\"/\"aarch64-unknown-linux-gnu\" => \"${SHA_AARCH64_LINUX}\"/" "$FORMULA"
          sed -i "s/\"x86_64-unknown-linux-gnu\" => \".*\"/\"x86_64-unknown-linux-gnu\" => \"${SHA_X86_64_LINUX}\"/" "$FORMULA"

      - name: Commit and push
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/edgee.rb
          git commit -m "Update edgee formula to ${VERSION}"
          git push
